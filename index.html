<!DOCTYPE html>
<html lang="en">
  <head>
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.05">
    <meta name="color-scheme" content="light dark">

    <title>AV Saviors</title>
    <meta name="description" content="Grand Junction's local specialists for any IT needs!">

    <style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: "Inter", system-ui, sans-serif;
  background: linear-gradient(135deg, #020617 0%, #0f172a 40%, #1e3a8a 100%);
  color: #e2e8f0;
  line-height: 1.6;
  min-height: 100vh;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  width: 100%;
  background: rgba(2, 6, 23, 0.8);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  padding: 0.75rem 2rem;
  z-index: 100;
  border-bottom: 1px solid rgba(59, 130, 246, 0.2);
}

nav ul {
  list-style: none;
  display: flex;
  gap: 2rem;
}

nav a {
  text-decoration: none;
  color: #cbd5f5;
  font-weight: 500;
}

nav a:hover {
  color: #60a5fa;
}

/* HERO (fixed layout) */
.hero {
  text-align: center;
  padding: 2rem 1rem;
}

.hero-img {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  margin-bottom: 1.5rem;
}

.hero-text h1 {
  color: #60a5fa;
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

/* MAIN CONTENT */
main.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

section, #about, #projects, #contact {
  background: rgba(15, 23, 42, 0.85);
  border-radius: 20px;
  margin-bottom: 3rem;
  padding: 2rem;
  border: 1px solid rgba(59, 130, 246, 0.2);
}

h2 {
  color: #60a5fa;
  margin-bottom: 1rem;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

label {
  color: #cbd5f5;
}

input,
textarea {
  padding: 0.8rem;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: #e2e8f0;
}

input:focus,
textarea:focus {
  outline: none;
  border-color: #3b82f6;
}

/* BUTTON */
button {
  background: linear-gradient(135deg, #2563eb, #60a5fa);
  color: white;
  border: none;
  border-radius: 25px;
  padding: 0.8rem;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* MOBILE */
@media (max-width: 700px) {
  .hero-img {
    max-height: 200px;
  }
}

    </style>
  </head>

  <body>

    <nav>
      <ul>
        <li><a href="#contact">Contact Us!</a></li>
      </ul>
    </nav>

    <header class="hero">
      <img src="kat6logocolor.png" alt="Logo" class="hero-img">

      <div class="hero-text">
        <h1>Grand Junction's own AV Saviors</h1>
      </div>
    </header>

    <main class="container">

      <div id="about">
        <h2>About us:</h2>
        <p>
          Beginning as just a few friends around a card table, 
          our team has developed into a trusted local group. 
          We've created a strong bond of trust and friendship 
          within our team and are excited to tackle any IT needs!
        </p>
      </div>
      
     <!-- <div id="projects">
        <h2>Projects:</h2>
        <h3>Home projector and sound system</h3>
        <p>
          When deciding on a meeting place for the team, we settled on one of our garages. 
          In order to create a more effective meeting environment within this storage space, 
          we cleaned a central area, set up a meeting space, and wired and mounted a projector, monitor, and speaker system.
        </p>
      </div>-->
      
      <div id="contact">
        <h2>Contact us!</h2>
        <form action="https://formspree.io/f/xjgjewzv" method="POST">
          <input type="hidden" name="_replyto" value="avsaviors@gmail.com">

          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="2" required></textarea>

          <button type="submit">Send</button>
        </form>
      </div>

    </main>

  </body>
</html>
